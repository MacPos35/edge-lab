name: edge-lab update

# Keeps the Polymarket edge-lab dashboard up to date with zero input. Runs hourly
# on GitHub's managed runners (free), commits refreshed state back to the repo, and
# publishes the dashboard to GitHub Pages (main branch /docs).
#
# Why the details matter:
#  - working-directory is load-bearing: logger.py/resolve.py open the sqlite CWD-relative
#    (config.DB_PATH = "edge_lab.sqlite"), while dashboard.py opens it __file__-relative
#    (DB_ABS). They only hit the SAME file when CWD == polymarket-edge-lab/.
#  - db.py runs the sqlite in WAL mode, so writes may sit in a -wal sidecar. We checkpoint
#    (TRUNCATE) before committing so the single committed .sqlite is self-contained.
#  - the self-commit each run also resets GitHub's 60-day inactivity timer, so the
#    schedule never auto-disables.

on:
  schedule:
    - cron: "17 * * * *"        # hourly at :17 (offset off the top-of-hour load spike)
  workflow_dispatch: {}          # manual "Run workflow" button

permissions:
  contents: write                # GITHUB_TOKEN needs push rights to commit state back

concurrency:
  group: edge-update
  cancel-in-progress: false      # let an in-flight run finish rather than corrupt a commit

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: polymarket logger + resolve (hourly)
        working-directory: ./polymarket-edge-lab
        run: |
          python logger.py
          python resolve.py

      - name: regenerate dashboard into docs/
        working-directory: ./polymarket-edge-lab
        run: python dashboard.py ../docs/index.html

      - name: checkpoint sqlite WAL into the main file
        working-directory: ./polymarket-edge-lab
        run: |
          python -c "import sqlite3; c=sqlite3.connect('edge_lab.sqlite'); c.execute('PRAGMA wal_checkpoint(TRUNCATE)'); c.close()"

      - name: commit refreshed state + published page
        run: |
          git config user.name  "edge-lab bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "nothing changed this run"
          else
            git commit -m "auto: refresh $(date -u +%FT%TZ)"
            # push with retry: a single transient failure here would silently
            # drop this hour's snapshots (next run starts from the last commit)
            for i in 1 2 3 4; do
              git pull --rebase --autostash
              if git push; then
                break
              elif [ "$i" = 4 ]; then
                echo "push failed after 4 attempts" >&2
                exit 1
              fi
              sleep $((2 ** i))
            done
          fi

      - name: watchdog (dead-man's switch)
        working-directory: ./polymarket-edge-lab
        # last step, after the commit, so a stale-data failure still persists state;
        # exits non-zero when data is stale despite green runs -> GitHub failure email
        run: python watchdog.py
